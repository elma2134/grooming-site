<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard จัดการคิว</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
h1{text-align:center}
.card{
 background:white;
 padding:15px;
 border-radius:15px;
 margin:10px 0;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
button{
 padding:8px 12px;
 border:none;
 border-radius:8px;
 margin:5px;
 cursor:pointer;
}
.wait{background:#ffc107}
.doing{background:#17a2b8;color:white}
.done{background:#28a745;color:white}
</style>

</head>

<body>

<h1>📋 Dashboard คิวลูกค้า</h1>

<button onclick="loadData()">🔄 รีเฟรช</button>

<div id="list"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxBSzwD3wqfMoSNsCd0k6Uk6kZkHg7Hg3509vtQ3Ir8zPAt582_o9vlGHNE7Z9DRAZu/execL";

async function loadData(){
 const res = await fetch(API);
 const data = await res.json();

 const list = document.getElementById('list');
 list.innerHTML = "";

 data.reverse().forEach(item=>{
  list.innerHTML += `
  <div class="card">
    <b>${item.name}</b> (${item.phone})<br>
    🐾 ${item.breed} | ✂️ ${item.service}<br>
    📌 สถานะ: <b>${item.status}</b><br>

    <button class="wait" onclick="update(${item.row},'รอคิว')">รอคิว</button>
    <button class="doing" onclick="update(${item.row},'กำลังทำ')">กำลังทำ</button>
    <button class="done" onclick="update(${item.row},'เสร็จแล้ว')">เสร็จแล้ว</button>
  </div>
  `;
 });
}

async function update(row,status){
 await fetch(API,{
  method:"POST",
  body: JSON.stringify({
    type:"update",
    row:row,
    status:status
  })
 });

 loadData();
}

loadData();
</script>

</body>
</html>

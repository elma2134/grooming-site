<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
 font-family:Inter,sans-serif;
 margin:0;
 background:#f5f7fb;
 color:#333;
}

/* HEADER */
.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:15px 20px;
 background:white;
 box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.toggle{
 cursor:pointer;
 padding:8px 12px;
 border-radius:10px;
 background:#eee;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:15px;
 padding:20px;
}

.card{
 background:white;
 padding:20px;
 border-radius:20px;
 box-shadow:0 10px 30px rgba(0,0,0,0.05);
 text-align:center;
}

/* LIST */
.list{
 padding:20px;
}

.item{
 background:white;
 margin-bottom:10px;
 padding:15px;
 border-radius:15px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.badge{
 padding:5px 10px;
 border-radius:20px;
 font-size:12px;
}

.wait{background:#ffe4a3}
.doing{background:#cce5ff}
.done{background:#c6f6d5}

/* BUTTON */
button{
 border:none;
 padding:6px 10px;
 border-radius:8px;
 cursor:pointer;
 margin-left:5px;
}

/* DARK MODE */
.dark{
 background:#111;
 color:white;
}
.dark .card, .dark .item{
 background:#1e1e1e;
}
</style>

</head>

<body>

<div class="header">
<h3>📊 Admin Dashboard</h3>
<div class="toggle" onclick="toggleDark()">🌙</div>
</div>

<div class="grid">
<div class="card">
<h2 id="total">0</h2>
<p>ทั้งหมด</p>
</div>
<div class="card">
<h2 id="waiting">0</h2>
<p>รอทำ</p>
</div>
<div class="card">
<h2 id="done">0</h2>
<p>เสร็จแล้ว</p>
</div>
</div>

<div class="list" id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("orders") || "[]");

// เพิ่ม demo ถ้ายังไม่มี
if(data.length===0){
 data.push({name:"สมชาย",phone:"099",status:"wait"});
 localStorage.setItem("orders",JSON.stringify(data));
}

function render(){
 const list=document.getElementById("list");
 list.innerHTML="";

 let total=data.length;
 let waiting=data.filter(d=>d.status=="wait").length;
 let done=data.filter(d=>d.status=="done").length;

 document.getElementById("total").innerText=total;
 document.getElementById("waiting").innerText=waiting;
 document.getElementById("done").innerText=done;

 data.forEach((d,i)=>{
  const div=document.createElement("div");
  div.className="item";

  let statusText="รอ";
  let cls="wait";

  if(d.status=="doing"){statusText="กำลังทำ"; cls="doing";}
  if(d.status=="done"){statusText="เสร็จ"; cls="done";}

  div.innerHTML=`
  <div>
   <b>${d.name}</b><br>
   ${d.phone}
  </div>
  <div>
   <span class="badge ${cls}">${statusText}</span>
   <button onclick="setStatus(${i},'doing')">▶</button>
   <button onclick="setStatus(${i},'done')">✔</button>
   <button onclick="del(${i})">🗑</button>
  </div>
  `;
  list.appendChild(div);
 });
}

function setStatus(i,status){
 data[i].status=status;
 save();
}

function del(i){
 data.splice(i,1);
 save();
}

function save(){
 localStorage.setItem("orders",JSON.stringify(data));
 render();
}

/* DARK MODE */
function toggleDark(){
 document.body.classList.toggle("dark");
}

/* AUTO REFRESH */
setInterval(()=>{
 data = JSON.parse(localStorage.getItem("orders") || "[]");
 render();
},2000);

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
 font-family:Arial;
 background:#111;
 color:white;
 padding:20px;
}

h1{margin-bottom:20px}

.card{
 background:#1e1e1e;
 padding:15px;
 border-radius:15px;
 margin-bottom:10px;
}

.btn{
 padding:8px 12px;
 border:none;
 border-radius:10px;
 cursor:pointer;
}

.done{background:#06C755;color:white}
</style>

</head>
<body>

<h1>📋 รายการจอง</h1>

<div id="list"></div>

<script>

const API_URL="https://script.google.com/macros/s/XXXXX/exec";

async function loadData(){
 const res = await fetch(API_URL);
 const data = await res.json();

 const list=document.getElementById("list");
 list.innerHTML="";

 data.reverse().forEach((item,i)=>{
  list.innerHTML+=`
  <div class="card">
    <b>${item.name}</b><br>
    📞 ${item.phone}<br>
    🕒 ${item.time}<br>
    📌 ${item.status}
  </div>
  `;
 });
}

// auto refresh
setInterval(loadData,3000);
loadData();

</script>

</body>
</html>

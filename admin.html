<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;text-align:center;transition:0.3s}

/* LOGIN */
#loginBox{
 max-width:300px;
 margin:100px auto;
 background:white;
 padding:20px;
 border-radius:15px;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* DASHBOARD */
#dashboard{display:none}

.card{
 background:white;
 padding:15px;
 border-radius:15px;
 margin:10px 0;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
 text-align:left;
}

/* BUTTON */
button{
 padding:8px 12px;
 border:none;
 border-radius:8px;
 margin:5px;
 cursor:pointer;
}

.wait{background:#ffc107}
.doing{background:#17a2b8;color:white}
.done{background:#28a745;color:white}

/* DARK MODE */
.dark{
 background:#121212;
 color:#eee;
}

.dark .card{
 background:#1e1e1e;
 color:white;
}

.dark button{
 background:#333;
 color:white;
}
</style>

</head>

<body>

<!-- 🔊 SOUND -->

<audio id="notiSound">
 <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<!-- 🔐 LOGIN -->

<div id="loginBox">
<h2>🔐 เข้าสู่ระบบ</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">เข้าสู่ระบบ</button>
<p id="error" style="color:red"></p>
</div>

<!-- 📋 DASHBOARD -->

<div id="dashboard">

<h2>📋 คิวลูกค้า</h2>

<button onclick="loadData()">🔄 รีเฟรช</button> <button onclick="toggleDark()">🌙 Dark Mode</button> <button onclick="logout()">🚪 ออก</button>

<div id="list"></div>

</div>

<script>
const API = "YOUR_SCRIPT_URL";

// 🔑 LOGIN CONFIG
const USERNAME = "admin";
const PASSWORD = "1234";

// 🔔 REALTIME TRACK
let lastCount = 0;

// ===== LOGIN =====
function login(){
 const u = document.getElementById('user').value;
 const p = document.getElementById('pass').value;

 if(u === USERNAME && p === PASSWORD){
  localStorage.setItem("loggedIn","true");
  showDashboard();
 }else{
  document.getElementById('error').innerText="❌ ข้อมูลไม่ถูกต้อง";
 }
}

// ===== LOGOUT =====
function logout(){
 localStorage.removeItem("loggedIn");
 location.reload();
}

// ===== CHECK SESSION =====
function checkLogin(){
 if(localStorage.getItem("loggedIn") === "true"){
  showDashboard();
 }
}

// ===== SHOW DASHBOARD =====
function showDashboard(){
 document.getElementById('loginBox').style.display="none";
 document.getElementById('dashboard').style.display="block";
 loadData();
}

// ===== LOAD DATA =====
async function loadData(){
 const res = await fetch(API);
 const data = await res.json();

 const list = document.getElementById('list');
 list.innerHTML = "";

 // 🔔 แจ้งเตือน
 if(data.length > lastCount){
  document.getElementById("notiSound").play();
  alert("📢 มีลูกค้าใหม่!");
 }
 lastCount = data.length;

 data.reverse().forEach(item=>{
  list.innerHTML += `
  <div class="card">
    <b>${item.name}</b> (${item.phone})<br>
    🐾 ${item.breed} | ✂️ ${item.service}<br>
    📌 สถานะ: <b>${item.status}</b><br>

    <button class="wait" onclick="update(${item.row},'รอคิว')">รอคิว</button>
    <button class="doing" onclick="update(${item.row},'กำลังทำ')">กำลังทำ</button>
    <button class="done" onclick="update(${item.row},'เสร็จแล้ว')">เสร็จแล้ว</button>
  </div>
  `;
 });
}

// ===== UPDATE STATUS =====
async function update(row,status){
 await fetch(API,{
  method:"POST",
  body: JSON.stringify({
    type:"update",
    row:row,
    status:status
  })
 });
 loadData();
}

// 🌙 DARK MODE
function toggleDark(){
 document.body.classList.toggle("dark");

 if(document.body.classList.contains("dark")){
  localStorage.setItem("dark","on");
 }else{
  localStorage.setItem("dark","off");
 }
}

// โหลด Dark Mode
if(localStorage.getItem("dark")==="on"){
 document.body.classList.add("dark");
}

// 🔄 AUTO REFRESH
setInterval(loadData,5000);

// INIT
checkLogin();
</script>

</body>
</html>

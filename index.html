<style>
body{
 font-family:'Inter','Segoe UI',sans-serif;
 margin:0;

}

/* TOP */
#topbar{
 position:fixed;

 width:100%;

 color:white;

 padding:8px;
 z-index:9999;
}

/* CONTAINER */
.container{

 padding:20px;
}

/* HERO */
.hero{
 background:rgba(255,255,255,0.7);

 padding:50px 20px;
 text-align:center;
 box-shadow:0 20px 50px rgba(0,0,0,0.08);
 position:relative;

}
.hero::after{
 content:'';

}
.price{font-size:26px;font-weight:bold}

/* BUTTON */
.btn{

 padding:15px 25px;

 text-decoration:none;
 display:inline-block;
 margin-top:12px;
 font-weight:bold;
 box-shadow:0 10px 25px rgba(0,0,0,0.15);
 transition:0.3s;
}
.btn:hover{transform:translateY(-3px) scale(1.03)}

.fb-btn{
 background:#1877f2;
 color:white;
 padding:12px 22px;
 border-radius:30px;
 text-decoration:none;
 display:inline-block;
 margin-top:10px;
}

/* SECTION */
section{
 background:rgba(255,255,255,0.8);
 backdrop-filter:blur(15px);
 border-radius:25px;
 padding:20px;
 margin:20px 0;
 box-shadow:0 10px 30px rgba(0,0,0,0.05);

}

/* REVIEW */
.review{
 background:white;
 padding:12px;
 border-radius:15px;
 margin:10px auto;
 max-width:280px;
 box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* INPUT */
input{
 width:100%;
 max-width:280px;
 padding:12px;
 margin:5px;
 border-radius:12px;
 border:1px solid #eee;
 box-shadow:inset 0 2px 5px rgba(0,0,0,0.05);
}

/* FLOAT */
.fab{position:fixed;bottom:15px;right:15px;background:#06C755;color:white;padding:15px;border-radius:50%;}
.fab-call{position:fixed;bottom:80px;right:20px;background:#ff4d6d;color:white;padding:15px;border-radius:50%;}
.fab-admin{
 position:fixed;
 bottom:20px;
 left:20px;
 background:#111;
 color:white;
 padding:12px;
 border-radius:50%;
 opacity:0.6;
}

/* POPUP */
#popup{
 position:fixed;
 bottom:20px;
 left:20px;
 background:white;
 padding:12px;
 border-radius:12px;
 display:none;
 box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* ANIMATION */
.fade{
 opacity:0;
 transform:translateY(20px);
 transition:0.6s;
}
.fade.show{
 opacity:1;
 transform:translateY(0);
}

<script>
// COUNTDOWN
let time=300;
setInterval(()=>{
 if(time>0){
  time--;
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById('time').innerText=`${m}:${s<10?'0'+s:s}`;
 }
},1000);

// POPUP
const names=["สมชาย","น้ำ","ฟ้า","เจน"];
setInterval(()=>{
 const popup=document.getElementById('popup');
 popup.innerHTML=`🐶 ${names[Math.floor(Math.random()*4)]} จองแล้ว`;
 popup.style.display='block';
 setTimeout(()=>popup.style.display='none',3000);
},9000);

// BOOK
function bookNow(){
 const name=document.getElementById('name').value;
 const phone=document.getElementById('phone').value;

 if(!name||!phone){alert("กรอกข้อมูล");return;}

 const msg=`จอง\n${name}\n${phone}`;
 window.location.href=`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
}

// SCROLL ANIMATION
const observer = new IntersectionObserver(entries=>{
 entries.forEach(entry=>{
  if(entry.isIntersecting){
   entry.target.classList.add("show");
  }
 });
});
document.querySelectorAll(".fade").forEach(el=>observer.observe(el));
</script>

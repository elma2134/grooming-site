<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Grooming Spa</title>

<style>
/* ===== BACKGROUND ===== */
body{
 font-family:'Inter','Segoe UI',sans-serif;
 margin:0;
 background:linear-gradient(-45deg,#ffe4ec,#e6f7ff,#fff,#fce4ff);
 background-size:400% 400%;
 animation:bgMove 12s ease infinite;
 color:#333;
 padding-top:40px;
}
@keyframes bgMove{
 0%{background-position:0% 50%}
 50%{background-position:100% 50%}
 100%{background-position:0% 50%}
}

/* TOP BAR */
#topbar{
 position:fixed;
 top:0;width:100%;
 background:#ff4d6d;
 color:white;
 text-align:center;
 padding:8px;
 z-index:9999;
}

/* CONTAINER */
.container{
 max-width:600px;
 margin:auto;
 padding:20px;
}

/* HERO */
.hero{
 background:rgba(255,255,255,0.8);
 backdrop-filter:blur(20px);
 text-align:center;
 padding:50px 20px;
 border-radius:30px;
 box-shadow:0 20px 50px rgba(0,0,0,0.08);
 animation:fadeIn 1s ease;
}
@keyframes fadeIn{
 from{opacity:0; transform:translateY(30px)}
 to{opacity:1; transform:translateY(0)}
}

/* BUTTON */
.btn{
 background:linear-gradient(135deg,#06C755,#00c96b);
 color:white;
 padding:15px 25px;
 border-radius:50px;
 text-decoration:none;
 display:inline-block;
 margin-top:10px;
 font-weight:bold;
 box-shadow:0 10px 25px rgba(0,0,0,0.2);
 position:relative;
 overflow:hidden;
 transition:0.3s;
}
.btn:hover{
 transform:translateY(-3px) scale(1.05);
}
.btn::after{
 content:'';
 position:absolute;
 top:0;left:-100%;
 width:100%;height:100%;
 background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
 transition:0.6s;
}
.btn:hover::after{left:100%}

.fb-btn{
 background:#1877f2;
 color:white;
 padding:12px 20px;
 border-radius:30px;
 text-decoration:none;
 display:inline-block;
 margin-top:10px;
}

/* SECTION */
section{
 background:rgba(255,255,255,0.85);
 backdrop-filter:blur(10px);
 margin:20px 0;
 padding:20px;
 border-radius:20px;
 box-shadow:0 10px 25px rgba(0,0,0,0.05);
 text-align:center;
}

/* REVIEW */
.review{
 background:white;
 padding:10px;
 margin:10px auto;
 border-radius:10px;
 max-width:300px;
}

/* FORM */
input,select{
 width:100%;
 max-width:320px;
 padding:12px;
 margin:6px auto;
 border-radius:12px;
 border:1px solid #eee;
 display:block;
}

/* FLOAT */
.fab{position:fixed;bottom:15px;right:15px;background:#06C755;color:white;padding:15px;border-radius:50%;}
.fab-call{position:fixed;bottom:80px;right:20px;background:#ff4d6d;color:white;padding:15px;border-radius:50%;}
.fab-admin{position:fixed;bottom:20px;left:20px;background:#111;color:white;padding:12px;border-radius:50%;opacity:0.7;}

/* POPUP */
#popup{
 position:fixed;
 bottom:20px;
 left:20px;
 background:white;
 padding:12px;
 border-radius:12px;
 display:none;
 box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div id="topbar">🔥 เหลือ <span id="slot">4</span> คิว!</div>

<div class="container">

<div class="hero">
<h1>🐶 Happy Grooming Spa 🐱</h1>
<p>สะอาด หอม น่ารักขึ้นทันที</p>
<h2>เริ่มต้น 250 บาท</h2>

<a href="https://line.me/R/ti/p/@groomingspa" class="btn">จองผ่าน LINE</a><br>
<a href="https://www.facebook.com/happycatspagrooming" target="_blank" class="fb-btn">📘 Facebook</a>

<p style="margin-top:10px;color:#666;">⭐ รีวิวจริง • ปลอดภัย • มืออาชีพ</p>

<div style="color:#ff4d6d;">
⏳ โปรหมดใน: <span id="time">05:00</span>
</div>
</div>

<section>
<h2>รีวิวลูกค้า</h2>
<div class="review">⭐⭐⭐⭐⭐ ดีมาก</div>
<div class="review">⭐⭐⭐⭐⭐ น้องไม่เครียด</div>
<div class="review">⭐⭐⭐⭐⭐ บริการดี</div>
</section>

<section>
<h2>📘 Facebook</h2>
<div style="display:flex;justify-content:center;">
  <div class="fb-page"
    data-href="https://www.facebook.com/happycatspagrooming"
    data-tabs="timeline"
    data-width="340"
    data-height="400">
  </div>
</div>
</section>

<section>
<h2>จองคิว</h2>
<input id="name" placeholder="ชื่อ">
<input id="phone" placeholder="เบอร์">

<select id="breed">
 <option>เลือกประเภท</option>
 <option>หมา</option>
 <option>แมวขนสั้น</option>
 <option>แมวขนยาว</option>
</select>

<select id="service">
 <option>เลือกบริการ</option>
 <option>อาบน้ำ</option>
 <option>ตัดขน</option>
 <option>อาบน้ำ + ตัดขน</option>
 <option>อาบน้ำ + ไถขน</option>
</select>

<button onclick="bookNow()" class="btn">ยืนยันจอง</button>
</section>

</div>

<a href="admin.html" class="fab-admin">⚙️</a>
<a href="tel:0961372568" class="fab-call">📞</a>
<a href="https://line.me/R/ti/p/@groomingspa" class="fab">💬</a>

<div id="popup"></div>

<div id="fb-root"></div>
<script async defer crossorigin="anonymous"
src="https://connect.facebook.net/th_TH/sdk.js#xfbml=1&version=v18.0"></script>

<script>
// COUNTDOWN
let time=300;
setInterval(()=>{
 if(time>0){
  time--;
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById('time').innerText=`${m}:${s<10?'0'+s:s}`;
 }
},1000);

// POPUP
const servicesList=['อาบน้ำ','ตัดขน','อาบน้ำ+ตัดขน'];
setInterval(()=>{
 const popup=document.getElementById('popup');
 popup.innerHTML=`🐶 มีลูกค้าจอง ${servicesList[Math.floor(Math.random()*3)]}`;
 popup.style.display='block';
 setTimeout(()=>popup.style.display='none',3000);
},8000);

// BOOK
function bookNow(){
 const name=document.getElementById('name').value;
 const phone=document.getElementById('phone').value;
 const breed=document.getElementById('breed').value;
 const service=document.getElementById('service').value;

 if(!name||!phone){
  alert("กรอกข้อมูล");
  return;
 }

 fetch("https://script.google.com/macros/s/AKfycbxcRH_UmS_MGKaWzmGoi5SfhpBrOI9rTLP78PWnOf19BPbMPfI3PIuTwEWXSodnaphr/exec",{
  method:"POST",
  body: JSON.stringify({
    name,
    phone,
    breed,
    service,
    status:"รอคิว",
    time:new Date().toLocaleString()
  })
 });

 const msg=`จอง\n${name}\n${phone}\n${breed}\n${service}`;
 window.location.href=`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
}
</script>

</body>
</html>

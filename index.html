<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Grooming Spa</title>

<!-- Facebook Pixel -->

!function(f,b,e,v,n,t,s){
 if(f.fbq)return;n=f.fbq=function(){n.callMethod?
 n.callMethod.apply(n,arguments):n.queue.push(arguments)};

<style>
/* ===== BACKGROUND ANIMATION ===== */
body{
 font-family:'Inter','Segoe UI',sans-serif;
 margin:0;
 background:linear-gradient(-45deg,#ffe4ec,#e6f7ff,#fff,#fce4ff);
 background-size:400% 400%;
 animation:bgMove 12s ease infinite;
 padding-top:40px;
}
@keyframes bgMove{
 0%{background-position:0% 50%}
 50%{background-position:100% 50%}
 100%{background-position:0% 50%}
}

/* TOP BAR */
#topbar{
 position:fixed;
 top:0;
 width:100%;
 background:#ff4d6d;
 color:white;
 text-align:center;
 padding:8px;
 z-index:9999;
}

/* CONTAINER */
.container{
 max-width:520px;
 margin:auto;
 padding:20px;
}

/* HERO */
.hero{
 background:rgba(255,255,255,0.7);
 backdrop-filter:blur(20px);
 border-radius:30px;
 padding:50px 20px;
 text-align:center;
 box-shadow:0 20px 50px rgba(0,0,0,0.08);
 animation:fadeIn 1s ease;
}
@keyframes fadeIn{
 from{opacity:0; transform:translateY(30px)}
 to{opacity:1; transform:translateY(0)}
}

/* BUTTON */
.btn{
 background:linear-gradient(135deg,#06C755,#00c96b);
 color:white;
 padding:16px 28px;
 border-radius:50px;
 font-weight:bold;
 text-decoration:none;
 display:inline-block;
 margin-top:12px;
 box-shadow:0 10px 30px rgba(0,0,0,0.2);
 position:relative;
 overflow:hidden;
 transition:0.3s;
}
.btn:hover{
 transform:translateY(-3px) scale(1.03);
}
.btn::after{
 content:'';
 position:absolute;
 top:0;left:-100%;
 width:100%;height:100%;
 background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
 transition:0.6s;
}
.btn:hover::after{left:100%}

/* SECTION */
section{
 background:rgba(255,255,255,0.8);
 backdrop-filter:blur(15px);
 border-radius:25px;
 padding:20px;
 margin:20px 0;
 box-shadow:0 10px 30px rgba(0,0,0,0.05);
 text-align:center;
 transform:translateY(30px);
 opacity:0;
 transition:0.8s;
}
section.show{
 transform:translateY(0);
 opacity:1;
}

/* REVIEW */
.review{
 background:white;
 padding:12px;
 border-radius:15px;
 margin:10px auto;
 max-width:280px;
}

/* INPUT */
input{
 width:100%;
 max-width:280px;
 padding:12px;
 margin:5px;
 border-radius:12px;
 border:1px solid #eee;
}

/* FLOAT */
.fab{position:fixed;bottom:15px;right:15px;background:#06C755;color:white;padding:15px;border-radius:50%;}
.fab-call{position:fixed;bottom:80px;right:20px;background:#ff4d6d;color:white;padding:15px;border-radius:50%;}
.fab-admin{position:fixed;bottom:20px;left:20px;background:#111;color:white;padding:12px;border-radius:50%;opacity:0.6;}

/* POPUP */
#popup{
 position:fixed;
 bottom:20px;
 left:20px;
 background:white;
 padding:12px;
 border-radius:12px;
 display:none;
 box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div id="topbar">🔥 เหลือ <span id="slot">4</span> คิว!</div>

<div class="container">

<div class="hero">
<h1>🐶 Happy Grooming Spa 🐱</h1>
<p>สะอาด หอม น่ารักขึ้นทันที</p>
<div class="price">เริ่มต้น 250 บาท</div>

<a href="https://line.me/R/ti/p/@groomingspa" class="btn">จองผ่าน LINE</a>

</div>

<section>
<h2>รีวิวลูกค้า</h2>
<div class="review">⭐⭐⭐⭐⭐ ดีมาก</div>
<div class="review">⭐⭐⭐⭐⭐ น้องไม่เครียด</div>
</section>

<section>
<h2>จองคิว</h2>
<input id="name" placeholder="ชื่อ"><br>
<input id="phone" placeholder="เบอร์"><br>
<button onclick="bookNow()" class="btn">ยืนยันจอง</button>
</section>

</div>

<div id="popup"></div>

<script>
// SCROLL ANIMATION
const observer = new IntersectionObserver(entries=>{
 entries.forEach(entry=>{
  if(entry.isIntersecting){
   entry.target.classList.add("show");
  }
 });
});
document.querySelectorAll("section").forEach(el=>observer.observe(el));

// CURSOR EFFECT
document.addEventListener("mousemove", e=>{
 const dot=document.createElement("div");
 dot.style.position="fixed";
 dot.style.left=e.clientX+"px";
 dot.style.top=e.clientY+"px";
 dot.style.width="6px";
 dot.style.height="6px";
 dot.style.background="#ff8fc4";
 dot.style.borderRadius="50%";
 dot.style.pointerEvents="none";
 dot.style.zIndex="9999";
 document.body.appendChild(dot);
 setTimeout(()=>dot.remove(),500);
});

// BOOK
function bookNow(){
 const name=document.getElementById('name').value;
 const phone=document.getElementById('phone').value;
 if(!name||!phone){alert("กรอกข้อมูล");return;}
 const msg=`จอง\n${name}\n${phone}`;
 window.location.href=`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
}
</script>

</body>
</html>

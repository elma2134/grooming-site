<style>

/* BUTTON */

.fab-call{position:fixed;bottom:80px;right:20px;background:#ff4d6d;color:white;padding:15px;border-radius:50%;}

<script>
// COUNTDOWN
let time=300;
setInterval(()=>{
 if(time>0){
  time--;
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById('time').innerText=`${m}:${s<10?'0'+s:s}`;
 }
},1000);

// BOOK
function bookNow(){
 const name=document.getElementById('name').value;
 const phone=document.getElementById('phone').value;

 if(!name||!phone){
  alert("กรอกข้อมูล");
  return;
 }

 const msg=`จอง\n${name}\n${phone}`;
 window.location.href=`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
}
</script>

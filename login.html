<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
 font-family:Arial;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 background:#111;
 color:white;
}

.box{
 background:#1e1e1e;
 padding:30px;
 border-radius:20px;
 text-align:center;
}

input{
 display:block;
 margin:10px auto;
 padding:10px;
 border-radius:10px;
 border:none;
}

button{
 padding:10px 20px;
 border:none;
 border-radius:10px;
 background:#06C755;
 color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 Admin Login</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz_B-dnbSZaVDu7tc0mIYLSuoGvE7U_Uq8H-FHV1ojqYiPBIoMQdsDLLJR-ArEYGvCA/exec";

async function login(){
 const username=document.getElementById("user").value;
 const password=document.getElementById("pass").value;

 const res = await fetch(API,{
  method:"POST",
  body: JSON.stringify({
    type:"login",
    username,
    password
  })
 });

 const data = await res.json();

 if(data.status==="success"){
  localStorage.setItem("admin","true");
  window.location.href="admin.html";
 }else{
  alert("รหัสผิด");
 }
}

</script>

</body>
</html>
